<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
>

<title>Для Принцессы 💖</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
    font-family:Arial,sans-serif;
}

body{

    width:100%;
    height:100vh;

    overflow:hidden;

    display:flex;
    justify-content:center;
    align-items:center;

    background:
    linear-gradient(
        135deg,
        #12070c,
        #2a1020,
        #0d0509
    );

    position:relative;

    color:white;
}

/* Карточка */

.card{

    width:92%;
    max-width:420px;

    padding:28px;

    text-align:center;

    border-radius:30px;

    background:rgba(255,255,255,0.05);

    border:1px solid rgba(255,255,255,0.08);

    backdrop-filter:blur(12px);

    box-shadow:0 0 40px rgba(0,0,0,0.5);

    z-index:2;
}

/* Заголовок */

h1{

    font-size:34px;

    color:#ffd2e2;

    margin-bottom:15px;
}

/* Поцелуй */

.kiss{

    font-size:110px;

    cursor:pointer;

    user-select:none;

    display:inline-block;

    animation:pulse 2s infinite;

    transition:0.3s;
}

.kiss:active{
    transform:scale(0.9);
}

@keyframes pulse{

    0%{
        transform:scale(1);
    }

    50%{
        transform:scale(1.08);
    }

    100%{
        transform:scale(1);
    }

}

/* Текст */

#lyrics{

    margin-top:25px;

    font-size:24px;

    line-height:1.5;

    color:#fff0f5;

    min-height:150px;

    opacity:0;

    transition:0.6s;

    padding:10px;
}

/* Телефон */

@media(max-width:480px){

    .card{
        padding:22px;
    }

    h1{
        font-size:28px;
    }

    .kiss{
        font-size:95px;
    }

    #lyrics{
        font-size:20px;
        min-height:140px;
    }

}

/* Сердца */

.heart{

    position:absolute;

    color:rgba(255,255,255,0.12);

    animation:float linear infinite;

    pointer-events:none;
}

@keyframes float{

    0%{
        transform:translateY(100vh);
        opacity:0;
    }

    30%{
        opacity:0.5;
    }

    100%{
        transform:translateY(-10vh);
        opacity:0;
    }

}

</style>
</head>
<body>

<!-- МУЗЫКА -->

<audio
id="music"
preload="auto"
playsinline
webkit-playsinline
>

<source src="./romans.mp3" type="audio/mpeg">

</audio>

<!-- КАРТОЧКА -->

<div class="card">

    <h1>Для Принцессы 💖</h1>

    <div
    class="kiss"
    onclick="startLove()"
    >
        💋
    </div>

    <div id="lyrics"></div>

</div>

<script>

/* ТЕКСТ ПЕСНИ */

const lyricsData = [

{
    time:0,
    text:"В свете фонаря блестит асфальт ✨"
},

{
    time:5,
    text:"Я люблю тебя - ты просто знай 💖"
},

{
    time:10,
    text:"Сдаётся мне, теперь это надолго 🌙"
},

{
    time:15,
    text:"Гори! Гори, не догорай 🔥"
},

{
    time:20,
    text:"Без тебя жизни нет - я не могу найти 💔"
},

{
    time:27,
    text:"Сколько не жмись к стене, сквозь неё не пройти 🥀"
},

{
    time:35,
    text:"Ни одного пути грешной души в зиме ❄️"
},

{
    time:42,
    text:"Без тебя смысла нет; без тебя жизни нет ❤️"
},

{
    time:50,
    text:"Сколько не жмись к стене, сквозь неё не пройти 🌌"
},

{
    time:58,
    text:"Без тебя жизни нет. Я не могу найти 💞"
},

{
    time:65,
    text:"Ни одного пути грешной души в зиме 🌙"
},

{
    time:73,
    text:"Без тебя смысла нет; без тебя жизни нет 💖"
}

];

let started = false;

async function startLove(){

    if(started) return;

    started = true;

    const music =
    document.getElementById("music");

    const lyrics =
    document.getElementById("lyrics");

    /* СТАРТ С НУЛЯ */

    music.pause();

    music.currentTime = 0;

    lyrics.style.opacity = 1;

    try{

        await music.play();

    }catch(err){

        console.log(err);

        alert("Нажми ещё раз 💖");
    }

    /* СИНХРОНИЗАЦИЯ */

    music.addEventListener("timeupdate", () => {

        const current =
        music.currentTime;

        for(
            let i = lyricsData.length - 1;
            i >= 0;
            i--
        ){

            if(current >= lyricsData[i].time){

                lyrics.innerText =
                lyricsData[i].text;

                break;
            }
        }

    });

}

/* СЕРДЦА */

for(let i = 0; i < 35; i++){

    let heart =
    document.createElement("div");

    heart.classList.add("heart");

    heart.innerHTML = "❤";

    heart.style.left =
    Math.random()*100 + "vw";

    heart.style.fontSize =
    (15 + Math.random()*30) + "px";

    heart.style.animationDuration =
    (5 + Math.random()*6) + "s";

    document.body.appendChild(heart);
}

</script>

</body>
</html>

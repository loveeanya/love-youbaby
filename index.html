<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Для Принцессы 💖</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    height:100vh;
    overflow:hidden;

    display:flex;
    justify-content:center;
    align-items:center;

    background:
    linear-gradient(
        135deg,
        #12070c,
        #2a1020,
        #0d0509
    );

    color:white;
}

/* Карточка */

.card{

    width:90%;
    max-width:380px;

    padding:30px;

    text-align:center;

    border-radius:30px;

    background:rgba(255,255,255,0.05);

    border:1px solid rgba(255,255,255,0.08);

    backdrop-filter:blur(12px);

    box-shadow:0 0 40px rgba(0,0,0,0.5);

    z-index:2;
}

/* Заголовок */

h1{
    font-size:34px;
    color:#ffd2e2;
    margin-bottom:10px;
}

/* Поцелуй */

.kiss{

    font-size:120px;

    cursor:pointer;

    user-select:none;

    display:inline-block;

    animation:pulse 2s infinite;

    transition:0.3s;
}

.kiss:active{
    transform:scale(0.9);
}

@keyframes pulse{

    0%{
        transform:scale(1);
    }

    50%{
        transform:scale(1.08);
    }

    100%{
        transform:scale(1);
    }

}

/* Текст */

#lyrics{

    margin-top:25px;

    font-size:24px;

    line-height:1.5;

    color:#fff0f5;

    min-height:120px;

    opacity:0;

    transition:0.6s;
}

/* Сердца */

.heart{

    position:absolute;

    color:rgba(255,255,255,0.12);

    animation:float linear infinite;
}

@keyframes float{

    0%{
        transform:translateY(100vh);
        opacity:0;
    }

    30%{
        opacity:0.5;
    }

    100%{
        transform:translateY(-10vh);
        opacity:0;
    }

}

</style>
</head>
<body>

<!-- Музыка -->

<audio id="music" preload="auto">
    <source src="./romans.mp3" type="audio/mpeg">
</audio>

<div class="card">

    <h1>Для Принцессы 💖</h1>

    <div class="kiss" onclick="startLove()">
        💋
    </div>

    <div id="lyrics"></div>

</div>

<script>

/* Слова по времени */

const lyricsData = [

{
    text:"Без тебя жизни нет, я не могу найти 💔",
    time:0
},

{
    text:"Сколько не жмись к стене, сквозь неё не пройти ✨",
    time:5
},

{
    text:"Ни одного пути грешной души в зиме 🌙",
    time:10
},

{
    text:"Без тебя смысла нет, без тебя жизни нет ❤️",
    time:15
},

{
    text:"Люблю тебя моя девочка 💞",
    time:20
}

];

let started = false;

async function startLove(){

    if(started) return;

    started = true;

    const music =
    document.getElementById("music");

    const lyrics =
    document.getElementById("lyrics");

    try{

        /* Важно для телефона */

        await music.play();

    }catch(err){

        console.log(err);

    }

    lyrics.style.opacity = 1;

    /* Синхрон текста */

    music.addEventListener("timeupdate", () => {

        const current =
        Math.floor(music.currentTime);

        for(let i = 0; i < lyricsData.length; i++){

            if(
                current >= lyricsData[i].time
            ){

                lyrics.innerText =
                lyricsData[i].text;

            }

        }

    });

}

/* Летающие сердца */

for(let i = 0; i < 35; i++){

    let heart =
    document.createElement("div");

    heart.classList.add("heart");

    heart.innerHTML = "❤";

    heart.style.left =
    Math.random()*100 + "vw";

    heart.style.fontSize =
    (15 + Math.random()*30) + "px";

    heart.style.animationDuration =
    (5 + Math.random()*6) + "s";

    document.body.appendChild(heart);
}

</script>

</body>
</html>
